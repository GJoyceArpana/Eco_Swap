<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoSwap | Sign Up</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gradient">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 shadow-lg rounded-4">
      <h2 class="text-center mb-4" style="color: #4b6cb7;">Create an Account</h2>
      <form id="signupForm">
        <input type="text" id="name" class="form-control mb-3" placeholder="Name" required />
        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required />
        <input type="password" id="password" class="form-control mb-3" placeholder="Password" required />
        <input type="text" id="location" class="form-control mb-3" placeholder="Location" />
        <button type="submit" id="submit" class="btn w-100" style="background-color: #4b6cb7; color: white;">Sign Up</button>
      </form>
      <p class="text-center mt-3">
        Already have an account?
        <a href="index.html" class="text-primary">Login</a>
      </p>
    </div>
  </div>

  <!-- Firebase Setup -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <!-- Firebase Auth Logic -->
  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        await userCredential.user.updateProfile({ displayName: name });
        alert("Signup successful!");
        window.location.href = "index.html";
      } catch (error) {
        alert("Signup failed oh no: " + error.message);
      }
    });
  </script>
</body>
</html>
