<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoSwap | Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-gradient">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 shadow-lg rounded-4">
      <h2 class="text-center text-success mb-4">Login to EcoSwap</h2>
      <form id="loginForm">
        <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required />
        <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required />
        <button type="submit" id="submit" class="btn btn-success w-100">Login</button>
      </form>
      <p class="text-center mt-3">
        Don’t have an account?
        <a href="signup.html" class="text-primary">Sign Up</a>
      </p>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
        alert("Login successful!");
        // Redirect to home/dashboard
        window.location.href = "home.html"; 
      } catch (error) {
        alert("Login failed: " + error.message);
      }
    });
  </script>
</body>
</html>
